<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDC · Leads por Agencia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0d1117;--ink2:#1c2333;--ink3:#2d3748;
  --paper:#f7f6f2;--paper2:#eeece6;--paper3:#e4e1d8;
  --rule:#d4d0c8;--red:#c0001a;--red-pale:#fde8eb;
  --gold:#b8860b;--gold-pale:#fdf6e3;--green:#0a6640;
  --green-pale:#e6f4ed;--blue:#1a3a6b;--blue-pale:#e8eef7;
  --muted:#7a7567;
  --font-display:'Syne',sans-serif;--font-body:'Instrument Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:13px;line-height:1.5}

/* HEADER */
.site-header{background:var(--ink);color:var(--paper);padding:0 24px;display:flex;align-items:stretch;justify-content:space-between;border-bottom:3px solid var(--red)}
.header-brand{display:flex;align-items:center;gap:12px;padding:16px 0}
.brand-mark{width:36px;height:36px;background:var(--red);border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:18px;color:white;letter-spacing:-1px;flex-shrink:0}
.brand-text h1{font-family:var(--font-display);font-size:18px;font-weight:800;letter-spacing:2px;color:var(--paper);line-height:1}
.brand-text p{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(247,246,242,.45);margin-top:3px}
.header-meta{display:flex;align-items:center;padding:0}
.meta-item{text-align:center;padding:0 14px;border-left:1px solid rgba(255,255,255,.08);height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.meta-num{font-family:var(--font-display);font-size:22px;font-weight:700;line-height:1}
.meta-num.r{color:var(--red)}.meta-num.g{color:#4ade80}.meta-num.y{color:#fbbf24}
.meta-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(247,246,242,.4);margin-top:2px}

/* NAV */
.agency-nav{position:sticky;top:0;z-index:100;background:var(--ink2);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 16px;gap:2px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.agency-nav::-webkit-scrollbar{display:none}
.nav-btn{background:transparent;border:none;color:rgba(247,246,242,.45);font-family:var(--font-display);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:13px 12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.nav-btn:hover{color:rgba(247,246,242,.8)}
.nav-btn.active{color:var(--paper);border-bottom-color:var(--red)}
.nav-badge{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);color:rgba(247,246,242,.6);font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px;margin-left:4px;font-family:var(--font-body);letter-spacing:0}
.nav-btn.active .nav-badge{background:var(--red);color:white}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:24px 16px 80px}
.agency-section{display:none}.agency-section.visible{display:block}
.agency-title-bar{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--ink);flex-wrap:wrap}
.agency-name{font-family:var(--font-display);font-size:28px;font-weight:800;letter-spacing:1px;line-height:1}
.agency-subtitle{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)}

/* STATS */
.agency-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:24px}
.astat{background:var(--paper2);border:1px solid var(--rule);border-radius:4px;padding:10px 12px}
.astat-val{font-family:var(--font-display);font-size:22px;font-weight:700;line-height:1}
.astat-val.blue{color:var(--blue)}.astat-val.gold{color:var(--gold)}.astat-val.green{color:var(--green)}.astat-val.red{color:var(--red)}
.astat-key{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:3px}

/* APV GROUP */
.apv-group{margin-bottom:24px;border:1px solid var(--rule);border-radius:6px;overflow:hidden;animation:slideIn .3s ease forwards;opacity:0;transform:translateY(8px)}
@keyframes slideIn{to{opacity:1;transform:translateY(0)}}
.apv-header{background:var(--ink);color:var(--paper);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.apv-header.unassigned{background:var(--ink3)}
.apv-name{font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;line-height:1.3}
.apv-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.apv-count{background:rgba(255,255,255,.12);color:rgba(247,246,242,.7);font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:2px;font-family:var(--font-body)}
.apv-fac-badge{background:var(--green);color:white;font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 7px;border-radius:2px;text-transform:uppercase}

/* TABLE */
.leads-table-wrap{overflow-x:auto;background:white}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--paper2);padding:8px 12px;text-align:left;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--rule);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--paper3);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--paper2)}
tbody td{padding:9px 12px;vertical-align:middle}
.td-id{font-family:monospace;font-size:10px;color:var(--muted);white-space:nowrap}
.td-nombre{font-weight:600;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.td-auto{font-weight:700;font-size:10px;letter-spacing:.5px;color:var(--blue);text-transform:uppercase}

/* AGENT BADGE */
.agent-badge{display:inline-block;padding:2px 7px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.ag-EDGAR{background:#dbeafe;color:#1e40af}.ag-JAQUELINE{background:#d1fae5;color:#065f46}
.ag-ESTEFANIA{background:#fef3c7;color:#92400e}.ag-FABIOLA{background:#fee2e2;color:#991b1b}
.ag-LINO{background:#ede9fe;color:#4c1d95}.ag-NAYELY{background:#ffedd5;color:#9a3412}
.ag-NANCI{background:#fce7f3;color:#9d174d}

/* PIPELINE */
.pipeline{display:flex;gap:3px;align-items:center}
.step{display:flex;flex-direction:column;align-items:center;gap:2px}
.step-dot{width:22px;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1.5px solid;flex-shrink:0}
.step-dot.done{border-color:#059669;background:#ecfdf5;color:#059669}
.step-dot.done.final{background:#059669;color:white;box-shadow:0 0 0 3px rgba(5,150,105,.2)}
.step-dot.pend{border-color:#e5e7eb;background:#f9fafb;color:#d1d5db}

/* DATE */
.date-cell{font-family:monospace;font-size:10px;color:var(--ink3);white-space:nowrap}
.date-cell.empty{color:#d1d5db}

/* PROGRESS */
.prog-wrap{display:flex;align-items:center;gap:5px;min-width:70px}
.prog-bar{flex:1;background:var(--paper3);border-radius:2px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px}
.prog-pct{font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap;width:26px;text-align:right}

/* COMMENT BUTTON */
.btn-comment{background:none;border:1.5px solid var(--rule);border-radius:3px;padding:3px 7px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:var(--font-body);transition:all .15s}
.btn-comment:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-pale)}
.btn-comment.has-comment{border-color:#d97706;color:#92400e;background:#fef3c7}
.btn-comment.has-comment:hover{border-color:#92400e;background:#fde68a}

/* LEGEND */
.legend{display:flex;gap:12px;padding:8px 16px;background:var(--paper2);border-top:1px solid var(--rule);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600}
.legend-dot{width:11px;height:11px;border-radius:2px;border:1.5px solid #059669;background:#ecfdf5}
.legend-dot.pend{border-color:#e5e7eb;background:#f9fafb}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(13,17,23,.65);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal-box{background:white;border-radius:8px;width:100%;max-width:520px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-header{background:var(--ink);color:var(--paper);padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-title{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:1px;line-height:1.3}
.modal-sub{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(247,246,242,.45);margin-top:4px}
.modal-close{background:rgba(255,255,255,.1);border:none;color:var(--paper);width:28px;height:28px;border-radius:3px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.modal-close:hover{background:rgba(255,255,255,.2)}
.modal-body{padding:20px}
.modal-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px}
.modal-comment{background:var(--paper2);border:1px solid var(--rule);border-radius:4px;padding:14px 16px;font-size:13px;line-height:1.6;color:var(--ink3)}
.modal-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.modal-chip{background:var(--paper2);border:1px solid var(--rule);border-radius:3px;padding:3px 9px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}

/* MOBILE CARDS */
.lead-cards{display:none}

/* ══ RESPONSIVE ══ */
@media(max-width:700px){
  .leads-table-wrap{display:none}
  .lead-cards{display:block}

  .lead-card{background:white;border-bottom:1px solid var(--paper3);padding:12px 14px;cursor:pointer;transition:background .12s}
  .lead-card:last-child{border-bottom:none}
  .lead-card:hover{background:var(--paper2)}
  .lc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
  .lc-nombre{font-weight:700;font-size:13px;line-height:1.3;flex:1}
  .lc-id{font-family:monospace;font-size:9px;color:var(--muted);margin-top:2px}
  .lc-mid{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .lc-auto{font-weight:700;font-size:11px;color:var(--blue);text-transform:uppercase;letter-spacing:.5px}
  .lc-pipeline{display:flex;gap:3px;margin-bottom:8px}
  .lc-step{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
  .lc-dot{width:100%;max-width:38px;height:28px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1.5px solid}
  .lc-dot.done{border-color:#059669;background:#ecfdf5;color:#059669}
  .lc-dot.done.final{background:#059669;color:white}
  .lc-dot.pend{border-color:#e5e7eb;background:#f9fafb;color:#d1d5db}
  .lc-lbl{font-size:7px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
  .lc-bottom{display:flex;align-items:center;gap:8px}
  .lc-prog{display:flex;align-items:center;gap:6px;flex:1}
  .lc-bar{flex:1;background:var(--paper3);border-radius:2px;height:4px;overflow:hidden}
  .lc-fill{height:100%;border-radius:2px}
  .lc-pct{font-size:10px;font-weight:700;color:var(--muted);width:28px;text-align:right}
  .lc-comment-dot{width:8px;height:8px;border-radius:50%;background:#d97706;flex-shrink:0;display:none}
  .lc-comment-dot.visible{display:block}

  .header-meta{display:flex}
  .meta-item{padding:0 10px}
  .meta-num{font-size:18px}
  .meta-label{font-size:7px;letter-spacing:1px}
  .site-header{padding:0 14px}
  .header-brand{padding:12px 0}
  .brand-text h1{font-size:15px;letter-spacing:1.5px}
  main{padding:16px 12px 80px}
  .agency-stats{grid-template-columns:repeat(3,1fr);gap:6px}
  .apv-name{font-size:10px;letter-spacing:1px}
  .legend{padding:8px 12px;gap:8px}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-brand">
    <div class="brand-mark">N</div>
    <div class="brand-text">
      <h1>BDC · LEADS</h1>

</div>

const STEPS=[{key:'asignacion',short:'A',lbl:'Asig.'},{key:'cita',short:'C',lbl:'Cita'},{key:'show',short:'S',lbl:'Show'},{key:'documentos',short:'D',lbl:'Docs'},{key:'solicitud',short:'R',lbl:'Sol.'},{key:'factura',short:'F',lbl:'Fac.'}];
const AGENCIES=Object.keys(RAW);
let current=AGENCIES[0];

// totals
let gtTotal=0,gtCitas=0,gtFac=0;
AGENCIES.forEach(ag=>{Object.values(RAW[ag]).forEach(leads=>{leads.forEach(l=>{gtTotal++;if(l.cita)gtCitas++;if(l.factura)gtFac++;});});});
document.getElementById('hdr-total').textContent=gtTotal;
document.getElementById('hdr-citas').textContent=gtCitas;
document.getElementById('hdr-facturas').textContent=gtFac;

// nav
const nav=document.getElementById('agencyNav');
AGENCIES.forEach(ag=>{
  const total=Object.values(RAW[ag]).reduce((a,l)=>a+l.length,0);
  const btn=document.createElement('button');
  btn.className='nav-btn'+(ag===current?' active':'');
  btn.innerHTML=ag+`<span class="nav-badge">${total}</span>`;
  btn.onclick=()=>{current=ag;render();document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',AGENCIES[i]===ag));};
  nav.appendChild(btn);
});

function progColor(p){return p===100?'#059669':p>=60?'#d97706':p>=30?'#3b82f6':'#94a3b8'}
function leadProgress(l){return STEPS.filter(s=>l[s.key]).length}
function agencyStats(d){let total=0,citas=0,shows=0,sols=0,facs=0;Object.values(d).forEach(leads=>{leads.forEach(l=>{total++;if(l.cita)citas++;if(l.show)shows++;if(l.solicitud)sols++;if(l.factura)facs++;});});return{total,citas,shows,sols,facs}}

// modal
const modal=document.getElementById('commentModal');
const modalName=document.getElementById('modalName');
const modalSub=document.getElementById('modalSub');
const modalComment=document.getElementById('modalComment');
const modalMeta=document.getElementById('modalMeta');
document.getElementById('modalClose').onclick=closeModal;
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function openModal(l,apv){
  const comment=COMMENTS[l.id]||'Sin comentario registrado.';
  modalName.textContent=l.nombre;
  modalSub.textContent=`#${l.id} · ${l.auto||'—'} · ${apv}`;
  modalComment.textContent=comment;
  modalMeta.innerHTML=`
    <span class="modal-chip">Agente: ${l.agente}</span>
    ${l.cita?`<span class="modal-chip">Cita: ${l.cita}</span>`:''}
    ${l.factura?`<span class="modal-chip" style="background:#e6f4ed;border-color:#0a6640;color:#0a6640">✓ Facturado: ${l.factura}</span>`:''}
  `;
  modal.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){modal.classList.remove('open');document.body.style.overflow='';}

function render(){
  const ag=RAW[current];
  const st=agencyStats(ag);
  const apvList=Object.keys(ag);
  const sorted=[...apvList.filter(k=>k!=='APV NO ASIGNADO'),...apvList.filter(k=>k==='APV NO ASIGNADO')];

  let html=`
    <div class="agency-section visible">
      <div class="agency-title-bar">
        <div class="agency-name">${current}</div>
        <div class="agency-subtitle">Nissan · BDC 7</div>
      </div>
      <div class="agency-stats">
        <div class="astat"><div class="astat-val">${st.total}</div><div class="astat-key">Leads</div></div>
        <div class="astat"><div class="astat-val blue">${st.citas}</div><div class="astat-key">Citas</div></div>
        <div class="astat"><div class="astat-val gold">${st.shows}</div><div class="astat-key">Shows</div></div>
        <div class="astat"><div class="astat-val red">${st.sols}</div><div class="astat-key">Solic.</div></div>
        <div class="astat"><div class="astat-val green">${st.facs}</div><div class="astat-key">Fact.</div></div>
      </div>`;

  sorted.forEach((apv,gi)=>{
    const leads=ag[apv];
    const isUnassigned=apv==='APV NO ASIGNADO';
    const facCount=leads.filter(l=>l.factura).length;
    const delay=gi*0.07;

    html+=`
      <div class="apv-group" style="animation-delay:${delay}s">
        <div class="apv-header${isUnassigned?' unassigned':''}">
          <div class="apv-name">${apv}</div>
          <div class="apv-chips">
            ${facCount?`<span class="apv-fac-badge">✓ ${facCount} fact.</span>`:''}
            <span class="apv-count">${leads.length} lead${leads.length>1?'s':''}</span>
          </div>
        </div>

        <!-- DESKTOP TABLE -->
        <div class="leads-table-wrap">
          <table><thead><tr>
            <th>ID</th><th>Prospecto</th><th>Agente</th><th>Auto</th>
            <th style="text-align:center">Pipeline</th>
            <th>Asignación</th><th>Cita</th><th>Show</th><th>Docs</th><th>Sol.</th><th>Factura</th>
            <th>Avance</th><th>Comentario</th>
          </tr></thead><tbody>`;

    leads.forEach(l=>{
      const prog=leadProgress(l);
      const pct=Math.round(prog/STEPS.length*100);
      const color=progColor(pct);
      const hasComment=!!COMMENTS[l.id];

      html+=`<tr>
        <td class="td-id">#${l.id}</td>
        <td class="td-nombre">${l.nombre}</td>
        <td><span class="agent-badge ag-${l.agente}">${l.agente}</span></td>
        <td class="td-auto">${l.auto&&l.auto!=='-'?l.auto:'<span style="color:#d1d5db">—</span>'}</td>
        <td><div class="pipeline" style="justify-content:center">
          ${STEPS.map(s=>`<div class="step"><div class="step-dot ${l[s.key]?'done'+(s.key==='factura'?' final':''):'pend'}">${s.short}</div></div>`).join('')}
        </div></td>
        <td class="date-cell ${l.asignacion?'':'empty'}">${l.asignacion||'—'}</td>
        <td class="date-cell ${l.cita?'':'empty'}">${l.cita||'—'}</td>
        <td class="date-cell ${l.show?'':'empty'}">${l.show||'—'}</td>
        <td class="date-cell ${l.documentos?'':'empty'}">${l.documentos||'—'}</td>
        <td class="date-cell ${l.solicitud?'':'empty'}">${l.solicitud||'—'}</td>
        <td class="date-cell ${l.factura?'':'empty'}" style="${l.factura?'font-weight:700;color:#059669':''}">${l.factura||'—'}</td>
        <td><div class="prog-wrap">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="prog-pct">${pct}%</div>
        </div></td>
        <td><button class="btn-comment ${hasComment?'has-comment':''}" onclick='openModal(${JSON.stringify(l)},${JSON.stringify(apv)})'>${hasComment?'💬 Ver':'—'}</button></td>
      </tr>`;
    });

    html+=`</tbody></table></div>

        <!-- MOBILE CARDS -->
        <div class="lead-cards">`;

    leads.forEach(l=>{
      const prog=leadProgress(l);
      const pct=Math.round(prog/STEPS.length*100);
      const color=progColor(pct);
      const hasComment=!!COMMENTS[l.id];

      html+=`<div class="lead-card" onclick='openModal(${JSON.stringify(l)},${JSON.stringify(apv)})'>
          <div class="lc-top">
            <div>
              <div class="lc-nombre">${l.nombre}</div>
              <div class="lc-id">#${l.id}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
              <span class="agent-badge ag-${l.agente}">${l.agente}</span>
              ${hasComment?'<span style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#92400e;background:#fef3c7;border:1px solid #d97706;border-radius:2px;padding:1px 6px;font-weight:700">💬 Comentario</span>':''}
            </div>
          </div>
          <div class="lc-mid">
            <span class="lc-auto">${l.auto&&l.auto!=='-'?l.auto:'—'}</span>
            ${l.cita?`<span style="font-size:10px;color:var(--muted)">📅 ${l.cita}</span>`:''}
            ${l.factura?`<span style="font-size:10px;color:#059669;font-weight:700">✓ Facturado</span>`:''}
          </div>
          <div class="lc-pipeline">
            ${STEPS.map(s=>`<div class="lc-step"><div class="lc-dot ${l[s.key]?'done'+(s.key==='factura'?' final':''):'pend'}">${s.short}</div><span class="lc-lbl">${s.lbl}</span></div>`).join('')}
          </div>
          <div class="lc-bottom">
            <div class="lc-prog">
              <div class="lc-bar"><div class="lc-fill" style="width:${pct}%;background:${color}"></div></div>
              <div class="lc-pct">${pct}%</div>
            </div>
          </div>
        </div>`;
    });

    html+=`</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot"></div>Completado</div>
          <div class="legend-item"><div class="legend-dot pend"></div>Pendiente</div>
          <div class="legend-item" style="margin-left:auto;color:#059669;font-weight:700">
            ${leads.filter(l=>l.factura).length>0?leads.filter(l=>l.factura).length+' factura(s)':''}
          </div>
        </div>
      </div>`;
  });

  html+=`</div>`;
  document.getElementById('mainContent').innerHTML=html;
}

render();
</script>
</body>
</html>
